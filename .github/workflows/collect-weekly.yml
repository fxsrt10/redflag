name: Weekly Data Collection

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

env:
  DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run CourtListener lawsuit collector
        run: npx tsx src/collectors/courtlistener.ts
        continue-on-error: true

      - name: Run layoffs.fyi tracker
        run: npx tsx src/collectors/layoffs-tracker.ts
        continue-on-error: true

      - name: Run WARN Act notice collector
        run: npx tsx src/collectors/warn-notices.ts
        continue-on-error: true
