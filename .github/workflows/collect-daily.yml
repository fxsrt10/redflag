name: Daily Data Collection

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
  FMP_API_KEY: ${{ secrets.FMP_API_KEY }}

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run SEC EDGAR collector
        run: npx tsx src/collectors/sec-edgar.ts
        continue-on-error: true

      - name: Run FMP financials collector
        if: env.FMP_API_KEY != ''
        run: npx tsx src/collectors/fmp-financials.ts
        continue-on-error: true

      - name: Run news RSS collector
        run: npx tsx src/collectors/news-rss.ts
        continue-on-error: true
