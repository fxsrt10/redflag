name: Bootstrap New Companies

on:
  workflow_dispatch:
    inputs:
      tickers:
        description: 'Comma-separated tickers to add (leave empty for default list)'
        required: false
        type: string

env:
  DATABASE_URL_UNPOOLED: ${{ secrets.DATABASE_URL_UNPOOLED }}
  FMP_API_KEY: ${{ secrets.FMP_API_KEY }}

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Bootstrap companies
        env:
          BOOTSTRAP_TICKERS: ${{ github.event.inputs.tickers }}
        run: npx tsx src/collectors/company-bootstrap.ts
